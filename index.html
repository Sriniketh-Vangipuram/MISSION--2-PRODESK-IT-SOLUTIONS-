<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cash Flow Tracker</title>
  <link rel="stylesheet" href="./styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">
    <h1> Cash Flow Tracker</h1>

    <!-- Salary Input -->
    <div class="section">
      <label>Total Salary</label>
      <input type="number" id="salary" placeholder="Enter salary" />
    </div>

    <!-- Expense Form -->
    <div class="section">
      <label>Expense Name</label>
      <input type="text" id="expenseName" placeholder="e.g. Food" />

      <label>Expense Amount</label>
      <input type="number" id="expenseAmount" placeholder="e.g. 500" />

      <label>Category</label>
      <select id="expenseCategory">
        <option value="Food">Food</option>
        <option value="Rent">Rent</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
        <option value="Other">Other</option>
      </select>

      <button id="addExpense">Add Expense</button>
    </div>

    <!-- Dashboard -->
    <div class="dashboard">
      <h2>Salary: <span id="salaryDisplay">0</span></h2>
      <h2>Balance: <span id="balance">0</span></h2>
    </div>

    <!-- Expense List -->
    <ul id="expenseList"></ul>

    <!-- Chart -->
    <canvas id="myChart"></canvas>

  </div>
  <div id="modal" class="modal hidden">
  <div class="modal-box">
    <p id="modalMessage"></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>
  <script src="script.js"></script>
</body>
</html>
